<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAVASCRIPT</title>
    
</head>
<body>
    <script>

        let a=prompt("Enter first value :")
        let b=prompt("Enter second value :")
        
        document.write("Numbers before swapping :" +a+" "+ b)
        let temp = a;
        a = b;
        b = temp;
        document.write("<br>");
        document.write("Numbers after swapping :" +a+" "+b)
       
    </script>
</body>
</html>
